name: Frontend DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'devops-bootcamp-linker-frontend/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification on Push/PR
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: github-notifications
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: |
            Event: ${{ github.event_name }}
            Actor: ${{ github.actor }}
            Branch: ${{ github.ref_name }}
          SLACK_TITLE: Frontend DevSecOps Pipeline
          MSG_MINIMAL: true

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: devops-bootcamp-linker-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: devops-bootcamp-linker-frontend

      - name: Run ESLint
        run: npx next lint --dir .
        working-directory: devops-bootcamp-linker-frontend

  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        working-directory: devops-bootcamp-linker-frontend

      - name: Run npm audit
        run: npm audit --json | tee npm-audit-report.json
        working-directory: devops-bootcamp-linker-frontend

      - name: Upload SCA Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-reports
          path: devops-bootcamp-linker-frontend/npm-audit-report.json

  sast:
    name: semgrep/ci
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run semgrep
        run: semgrep scan --config=auto --json-output=semgrep-results.json

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-results.json

      - name: Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: |
            Frontend DevSecOps Pipeline *${{ job.status }}*
            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}